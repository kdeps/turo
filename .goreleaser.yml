version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: turo
    binary: turo
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - format: tar.gz
    name_template: "turo_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: kdeps
      name: homebrew-tap
    homepage: "https://github.com/kdeps/turo"
    description: "Stream editor — text in, kartographer graph out"
    license: "Apache-2.0"
